name: Bug report
description: Report something that is broken or behaves unexpectedly
title: '[Bug]: '
labels: ['bug']
body:
    - type: markdown
      attributes:
          value: |
              Thanks for taking the time to report a bug. Please include enough detail for someone else to reproduce the issue.

    - type: textarea
      id: description
      attributes:
          label: What happened?
          description: Describe the bug clearly.
          placeholder: When I click Submit on the problem page, ...
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: What did you expect?
          placeholder: The submission should appear in my submissions list.
      validations:
          required: true

    - type: textarea
      id: reproduction
      attributes:
          label: Steps to reproduce
          description: Numbered steps work best.
          placeholder: |
              1. Go to ...
              2. Click ...
              3. See error
      validations:
          required: true

    - type: input
      id: version
      attributes:
          label: Commit or version
          description: Branch name, commit hash, or deployed version if known.
          placeholder: main @ abc1234

    - type: input
      id: browser
      attributes:
          label: Browser / OS
          placeholder: Firefox 128 on macOS 15

    - type: textarea
      id: extra
      attributes:
          label: Additional context
          description: Screenshots, console errors, network failures, etc.
