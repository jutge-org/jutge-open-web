name: Feature request
description: Suggest a new feature or improvement
title: '[Feature]: '
labels: ['enhancement']
body:
    - type: markdown
      attributes:
          value: |
              Describe the problem first, then your proposed solution. Smaller, focused requests are easier to review and merge.

    - type: textarea
      id: problem
      attributes:
          label: Problem
          description: What user need or pain point does this address?
          placeholder: As an instructor, I need to ...
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: Proposed solution
          description: How would you solve it?
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Other approaches you thought about.

    - type: dropdown
      id: area
      attributes:
          label: Area
          options:
              - Students
              - Instructors
              - Administrators
              - Platform / UX
              - Documentation
              - Other
      validations:
          required: true

    - type: checkboxes
      id: scope
      attributes:
          label: Contribution
          options:
              - label: I am willing to open a pull request for this
                required: false
